<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Property360 placeholder image">
  <!-- Background gradient: deep foundation teal fading to a warmer sky -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D2B36"/>
      <stop offset="60%" stop-color="#1A4A5C"/>
      <stop offset="100%" stop-color="#2A6A7E"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D2B36"/>
      <stop offset="100%" stop-color="#08191F"/>
    </linearGradient>
    <linearGradient id="building" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#163842"/>
      <stop offset="100%" stop-color="#1E4A57"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="96" height="96" patternUnits="userSpaceOnUse">
      <path d="M 96 0 L 0 0 0 96" fill="none" stroke="#BFFF84" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="1000" fill="url(#sky)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>

  <!-- Distant horizon haze -->
  <rect x="0" y="640" width="1600" height="80" fill="#BFFF84" fill-opacity="0.06"/>

  <!-- Background buildings (subtle silhouettes) -->
  <g opacity="0.5">
    <rect x="80" y="480" width="160" height="280" fill="#0F313D"/>
    <rect x="260" y="420" width="120" height="340" fill="#11353F"/>
    <rect x="1240" y="450" width="180" height="310" fill="#0F313D"/>
    <rect x="1440" y="510" width="100" height="250" fill="#0E2C36"/>
  </g>

  <!-- Foreground building -->
  <g>
    <!-- Body -->
    <rect x="520" y="280" width="560" height="500" fill="url(#building)"/>
    <!-- Roof line -->
    <rect x="500" y="270" width="600" height="22" fill="#0D2B36"/>
    <!-- Door -->
    <rect x="760" y="660" width="80" height="120" fill="#0D2B36"/>
    <rect x="760" y="660" width="80" height="120" fill="#BFFF84" fill-opacity="0.08"/>
    <circle cx="828" cy="722" r="3" fill="#BFFF84"/>

    <!-- Window grid: 4 columns × 3 rows on each tower half -->
    <g fill="#BFFF84" fill-opacity="0.92">
      <!-- Row 1 -->
      <rect x="560" y="330" width="60" height="60" rx="4"/>
      <rect x="650" y="330" width="60" height="60" rx="4"/>
      <rect x="740" y="330" width="60" height="60" rx="4"/>
      <rect x="830" y="330" width="60" height="60" rx="4" fill-opacity="0.45"/>
      <rect x="920" y="330" width="60" height="60" rx="4"/>
      <rect x="1010" y="330" width="60" height="60" rx="4" fill-opacity="0.45"/>
      <!-- Row 2 -->
      <rect x="560" y="430" width="60" height="60" rx="4" fill-opacity="0.45"/>
      <rect x="650" y="430" width="60" height="60" rx="4"/>
      <rect x="740" y="430" width="60" height="60" rx="4"/>
      <rect x="830" y="430" width="60" height="60" rx="4"/>
      <rect x="920" y="430" width="60" height="60" rx="4" fill-opacity="0.45"/>
      <rect x="1010" y="430" width="60" height="60" rx="4"/>
      <!-- Row 3 -->
      <rect x="560" y="530" width="60" height="60" rx="4"/>
      <rect x="650" y="530" width="60" height="60" rx="4" fill-opacity="0.45"/>
      <rect x="740" y="530" width="60" height="60" rx="4"/>
      <rect x="920" y="530" width="60" height="60" rx="4"/>
      <rect x="1010" y="530" width="60" height="60" rx="4"/>
    </g>

    <!-- Accent stripe down the spine -->
    <rect x="794" y="290" width="12" height="370" fill="#BFFF84" opacity="0.18"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="780" width="1600" height="220" fill="url(#ground)"/>

  <!-- Soft moon / sun -->
  <circle cx="1280" cy="220" r="60" fill="#BFFF84" fill-opacity="0.12"/>
  <circle cx="1280" cy="220" r="38" fill="#BFFF84" fill-opacity="0.22"/>

  <!-- Wordmark — sits at the bottom-left, low contrast -->
  <g transform="translate(80 860)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="#BFFF84" fill-opacity="0.55">
      Property360
    </text>
    <text x="0" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="500" letter-spacing="6" fill="#BFFF84" fill-opacity="0.45">
      NO PHOTO ADDED YET
    </text>
  </g>
</svg>
